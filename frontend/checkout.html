<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academia QA - Finalizar Compra</title>
  <!-- Load the Monad Pay Button Script (ARS) -->
  <script src="./btn.js?v=2" data-amount="220980" data-currency="ARS" data-lang="es" data-theme="auto" defer></script>
  
  <style>
    /* Checkout Specific Styles */
    :root {
      --co-bg: #f9f9fb;
      --co-surface: #ffffff;
      --co-border: #e2e8f0;
      --co-text: #1e293b;
      --co-text-muted: #64748b;
      --co-primary: #0f172a;
    }
    
    [data-theme="dark"] {
      --co-bg: #0f1115;
      --co-surface: #1a1d24;
      --co-border: #2d3748;
      --co-text: #f8fafc;
      --co-text-muted: #94a3b8;
      --co-primary: #ffffff;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--co-bg);
      color: var(--co-text);
      line-height: 1.5;
    }

    header {
      background: var(--co-surface);
      border-bottom: 1px solid var(--co-border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .currency-toggle {
      background: var(--co-bg);
      border: 1px solid var(--co-border);
      padding: 4px;
      border-radius: 8px;
      display: flex;
      gap: 4px;
    }

    .currency-toggle button {
      background: transparent;
      border: none;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      color: var(--co-text-muted);
      font-size: 14px;
    }

    .currency-toggle button.active {
      background: var(--co-surface);
      color: var(--co-text);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    main {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 32px;
    }

    @media (max-width: 768px) {
      main { 
        grid-template-columns: 1fr; 
        margin: 20px auto;
        padding: 0 16px;
      }
      .card { padding: 16px; }
      header { padding: 12px 16px; }
    }

    .card {
      background: var(--co-surface);
      border-radius: 16px;
      border: 1px solid var(--co-border);
      padding: 24px;
      margin-bottom: 24px;
    }

    h2 { margin: 0 0 24px; font-size: 18px; }

    /* Cart Item */
    .cart-item {
      display: flex;
      gap: 16px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--co-border);
      margin-bottom: 24px;
    }
    .cart-item-img {
      width: 80px; height: 80px;
      background: #e2e8f0;
      border-radius: 8px;
      background-image: url('https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=200&h=200&fit=crop');
      background-size: cover;
    }
    .cart-item-details h3 { margin: 0 0 4px; font-size: 16px; }
    .cart-item-details .tags { font-size: 12px; color: var(--co-text-muted); }
    .cart-item-price { margin-left: auto; font-weight: 600; }

    /* Payment Methods */
    .payment-methods {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .payment-method {
      display: flex;
      align-items: center;
      padding: 16px;
      border: 1px solid var(--co-border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .payment-method:hover { border-color: #64748b; }
    .payment-method.active {
      border-color: #6C47FF;
      background: rgba(108, 71, 255, 0.02);
    }
    .payment-method input[type="radio"] {
      margin-right: 16px;
      width: 18px; height: 18px;
      accent-color: #6C47FF;
    }
    .payment-method-icon {
      font-size: 24px; margin-right: 12px;
    }
    .payment-method-desc {
      display: block; font-size: 13px; color: var(--co-text-muted); margin-top: 2px;
    }
    .badge-new {
      background: #e0e7ff; color: #4338ca;
      font-size: 11px; font-weight: 600;
      padding: 2px 6px; border-radius: 4px;
      margin-left: 8px;
    }
    [data-theme="dark"] .badge-new { background: #312e81; color: #a5b4fc; }

    /* Summary */
    .summary-row {
      display: flex; justify-content: space-between;
      margin-bottom: 12px; font-size: 15px; color: var(--co-text-muted);
    }
    .summary-total {
      display: flex; justify-content: space-between;
      margin-top: 16px; padding-top: 16px;
      border-top: 1px solid var(--co-border);
      font-size: 18px; font-weight: 700; color: var(--co-text);
    }
    .summary-note {
      font-size: 13px; color: var(--co-text-muted);
      text-align: center; margin-top: 16px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    
    #monad-pay { margin-top: 24px; width: 100%; text-align: center;}
    
  </style>
</head>
<body>

  <header>
    <div class="brand">🎓 Academia QA</div>
    <div class="currency-toggle" role="radiogroup" aria-label="Moneda">
      <button class="active" id="btn-ars" role="radio" aria-checked="true">ARS</button>
      <button id="btn-usd" role="radio" aria-checked="false">USD</button>
    </div>
  </header>

  <main>
    <div class="checkout-left">
      <div class="card">
        <h2>Tu Carrito</h2>
        <div class="cart-item">
          <div class="cart-item-img"></div>
          <div class="cart-item-details">
            <h3>Bootcamp QA Automation</h3>
            <div class="tags">Acceso de por vida · Certificado</div>
          </div>
          <div class="cart-item-price price-val" data-usd="152.40" data-ars="220980">US$152.40</div>
        </div>
      </div>

      <div class="card">
        <h2>Método de pago</h2>
        <div class="payment-methods" role="radiogroup" aria-label="Métodos de pago">
          
          <label class="payment-method">
            <input type="radio" name="payment" value="card">
            <span class="payment-method-icon" aria-hidden="true">💳</span>
            <div>
              <strong>Tarjeta de Crédito / Débito</strong>
            </div>
          </label>

          <label class="payment-method active">
            <input type="radio" name="payment" value="monad" checked>
            <span class="payment-method-icon" aria-hidden="true">⚡</span>
            <div>
              <strong>Pago con QR</strong><span class="badge-new">5% de descuento</span>
              <span class="payment-method-desc">Pagás en pesos o cripto</span>
            </div>
          </label>

        </div>
      </div>
    </div>

    <div class="checkout-right">
      <div class="card">
        <h2>Resumen de Orden</h2>
        <div class="summary-row">
          <span>Subtotal</span>
          <span class="price-val" data-usd="152.40" data-ars="220980">US$152.40</span>
        </div>
        <div class="summary-row">
          <span>Impuestos</span>
          <span>Incluidos</span>
        </div>
        <div class="summary-total">
          <span>Total a pagar</span>
          <span class="price-val" data-usd="152.40" data-ars="220980">US$152.40</span>
        </div>
        
        <p style="font-size: 13px; color: var(--co-text-muted); text-align: center; margin-top: 16px;">
          Cotización cripto: <strong>1 USDC = 1450 ARS</strong>
        </p>

        <!-- Monad Pay Button Container -->
        <div id="monad-pay"></div>
        
        <div class="summary-note">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          Pago cifrado · SSL · Powered by Monad
        </div>
      </div>
    </div>
  </main>

  <script>
    // Currency Toggle Logic
    const btnArs = document.getElementById('btn-ars');
    const btnUsd = document.getElementById('btn-usd');
    const prices = document.querySelectorAll('.price-val');
    const scriptTag = document.querySelector('script[src="./btn.js"]');
    
    function setCurrency(cur) {
      btnArs.classList.toggle('active', cur === 'ARS');
      btnArs.setAttribute('aria-checked', cur === 'ARS');
      btnUsd.classList.toggle('active', cur === 'USD');
      btnUsd.setAttribute('aria-checked', cur === 'USD');
      
      prices.forEach(p => {
        if (cur === 'ARS') {
          p.textContent = '$' + Number(p.getAttribute('data-ars')).toLocaleString('es-AR');
        } else {
          p.textContent = 'US$' + Number(p.getAttribute('data-usd')).toFixed(2);
        }
      });

      // Update script tag dynamically (Note: in a real framework like React, props handle this automatically)
      // Here we just mock the update, the real btn.js would need to listen to attribute changes.
    }

    btnArs.addEventListener('click', () => setCurrency('ARS'));
    btnUsd.addEventListener('click', () => setCurrency('USD'));

    // Payment method selector logic
    const methods = document.querySelectorAll('.payment-method');
    methods.forEach(m => {
      m.addEventListener('click', () => {
        methods.forEach(om => om.classList.remove('active'));
        m.classList.add('active');
        m.querySelector('input').checked = true;
      });
    });

    // Theme sync with system
    const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
  </script>
</body>
</html>
